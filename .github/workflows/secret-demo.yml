name: Secret Demo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Use Secret Directly
        run: |
          echo "Secret (Direct):"
          echo "${{ secrets.TEST_SECRET }}"

      - name: Use Secret via Environment Variable (Injection)
        env:
          API_KEY: ${{ secrets.TEST_SECRET }}
        run: |
          echo "Secret (Env Var):"
          echo "$API_KEY"
