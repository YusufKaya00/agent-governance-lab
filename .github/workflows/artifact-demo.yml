name: Artifact Coordination Demo

on:
  workflow_dispatch:
  pull_request:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Generate report
        run: |
          echo '{"status":"SUCCESS","coverage":"95%","tests":"120 passed"}' > report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.json

  consume-report:
    needs: generate-report
    runs-on: ubuntu-latest

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: build-report

      - name: Display report
        run: |
          cat report.json
